<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEFASTOS | Support</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400&family=Inter:wght@300;400&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffffff;
            color: #000000;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 80px 0 40px;
            text-align: center;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 6rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            text-decoration: none;
            color: #000;
            display: inline-block;
            transition: opacity 0.3s;
        }

        .logo:hover {
            opacity: 0.7;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            max-width: 600px;
            text-align: center;
        }

        .welcome-text {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #666;
            margin-bottom: 60px;
            font-weight: 300;
            letter-spacing: 0.05em;
        }

        .welcome-text span {
            color: #000;
            font-weight: 400;
        }

        .contact-actions {
            display: flex;
            gap: 60px;
            align-items: center;
        }

        .action-btn {
            text-decoration: none;
            color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .action-btn i {
            font-size: 3.5rem;
            margin-bottom: 15px;
        }

        .action-btn span {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: #999;
        }

        .action-btn:hover {
            transform: scale(1.3);
        }

        .action-btn:hover i {
            color: #000;
        }

        @media (max-width: 768px) {
            .logo {
                font-size: 3rem;
                letter-spacing: 0.15em;
            }
            .contact-actions {
                gap: 40px;
            }
            .action-btn i {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <a href="/" class="logo">Hefastos</a>
    </header>

    <main>
        <p class="welcome-text">
            Если у вас возникли вопросы по работе сайта или есть какие-то проблемы с заказом — <span>мы всегда на связи и готовы помочь.</span>
        </p>

        <div class="contact-actions">
            <a href="https://t.me/my_user_name3" target="_blank" class="action-btn">
                <i class="fa-brands fa-telegram"></i>
                <span>Telegram</span>
            </a>

            <a href="https://wa.me/111111111" target="_blank" class="action-btn">
                <i class="fa-brands fa-whatsapp"></i>
                <span>WhatsApp</span>
            </a>
        </div>
    </main>

</body>
</html>
