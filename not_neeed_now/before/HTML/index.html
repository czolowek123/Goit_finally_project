<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hefastos | Official Boutique</title>
    <link rel="stylesheet" href="static/style.css">
</head>
<body>

    <header>
        <div class="header-right">
            <div class="cart-icon-container" onclick="toggleCart()">
                <svg class="trolley-icon" viewBox="0 0 24 24">
                    <path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/>
                </svg>
                <span id="cart-count" class="cart-badge">0</span>
            </div>
        </div>

        <div class="logo-center">
            <a href="/">Hefastos</a>
        </div>

        <nav>
            <ul>
                <li><a href="/collections/">Коллекции</a></li>
                <li><a href="/support/">Поддержка</a></li>
            </ul>
        </nav>
    </header>

    <div id="cart-modal" class="cart-modal">
        <div class="cart-content">
            <h2 class="cart-title">Ваша корзина</h2>
            <div id="cart-items-list">
                </div>
            <button class="close-cart-text" onclick="toggleCart()">Закрыть</button>
        </div>
    </div>

    <main>
        <div id="product-grid" class="product-grid"></div>
        <div id="product-detail-view"></div>
    </main>

    <script src="static/script.js"></script>
</body>
</html>
